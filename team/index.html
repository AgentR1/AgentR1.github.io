<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>团队成员 | LLMs and Agentic AI</title>
  <meta name="description" content="USTC-AGI LLMs and Agentic AI 方向团队成员页面。" />
  <style>
    :root {
      --accent: #c0392b;
      --accent-dark: #a93226;
      --accent-light: #fff3f2;
      --text: #1a1a1a;
      --text-muted: #5b5b5b;
      --border: #e6e6e2;
      --bg: #f7f7f5;
      --shadow: 0 10px 28px rgba(0, 0, 0, 0.06);
      --font: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC",
              "PingFang SC", "Hiragino Sans GB", sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      line-height: 1.8;
      font-size: 16px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      text-align: justify;
      text-justify: inter-ideograph;
    }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    .container {
      max-width: 1180px;
      margin: 0 auto;
      padding: 0 20px;
    }

    .top-nav {
      position: sticky;
      top: 0;
      z-index: 120;
      background: rgba(255, 255, 255, 0.94);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid #e8e8e8;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.05);
    }
    .top-nav .container {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      min-height: 64px;
    }
    .nav-brand {
      flex-shrink: 0;
      font-size: 0.92rem;
      font-weight: 800;
      color: #111;
      letter-spacing: 0.01em;
      white-space: nowrap;
    }
    .nav-brand span { color: var(--accent); }
    .nav-links {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      overflow-x: auto;
      scrollbar-width: none;
      padding: 10px 0;
      width: 100%;
    }
    .nav-links::-webkit-scrollbar { display: none; }
    .nav-links a {
      flex-shrink: 0;
      padding: 8px 14px;
      border-radius: 999px;
      border: 1px solid transparent;
      font-size: 0.84rem;
      font-weight: 600;
      color: #555;
      transition: color .18s, background .18s, border-color .18s, transform .18s;
    }
    .nav-links a:hover {
      color: var(--accent);
      background: var(--accent-light);
      border-color: #f2d2ce;
      text-decoration: none;
      transform: translateY(-1px);
    }

    header {
      background: linear-gradient(160deg, #ffffff 55%, #fff5f4 100%);
      border-bottom: 1px solid #e8e8e8;
      padding: 72px 0 56px;
      text-align: center;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.2s ease;
    }
    header:hover {
      background: linear-gradient(160deg, #fffdfd 55%, #ffeceb 100%);
    }
    header:active {
      transform: scale(0.997);
    }
    header:focus-visible {
      outline: 3px solid rgba(192, 57, 43, 0.2);
      outline-offset: -6px;
    }
    header h1 {
      font-size: 2.3rem;
      font-weight: 800;
      line-height: 1.25;
      color: #111;
    }
    header h1 .highlight { color: var(--accent); }
    .header-sub {
      margin-top: 14px;
      font-size: 0.97rem;
      color: #666;
      line-height: 1.75;
    }

    main {
      flex: 1;
      padding: 40px 0 80px;
    }
    .member-shell {
      max-width: 1120px;
      margin: 0 auto;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 20px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .member-header {
      padding: 28px 28px 18px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(180deg, #ffffff 0%, #fffaf9 100%);
    }
    .member-header h2 {
      font-size: 1.5rem;
      font-weight: 800;
      color: #111;
      margin-bottom: 8px;
    }
    .member-header p {
      font-size: 0.94rem;
      color: var(--text-muted);
    }
    .member-body {
      padding: 28px;
    }
    .member-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }
    .member-card,
    .member-card-static {
      background: #fff;
      border: 1px solid #e8e8e8;
      border-radius: 12px;
      padding: 16px 18px;
      display: flex;
      align-items: center;
      gap: 14px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.04);
    }
    .member-card {
      text-decoration: none;
    }
    .member-card:hover {
      text-decoration: none;
      transform: translateY(-1px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.08);
    }
    .member-avatar {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: linear-gradient(135deg,#003087,#2471a3);
      color: #fff;
      font-size: 0.98rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .member-name {
      font-size: 0.98rem;
      font-weight: 700;
      color: #111;
    }

    footer {
      background: #1c1c1c;
      color: #999;
      text-align: center;
      padding: 28px 24px;
      font-size: 0.84rem;
    }
    footer a { color: #e87b6e; }
    footer .footer-funding {
      margin-top: 12px;
      font-size: 0.82rem;
      color: #888;
      line-height: 1.6;
    }

    @media (max-width: 640px) {
      .top-nav .container {
        align-items: flex-start;
        flex-direction: column;
        justify-content: center;
        gap: 2px;
        padding-top: 8px;
        padding-bottom: 8px;
      }
      .nav-brand { white-space: normal; }
      .nav-links {
        justify-content: flex-start;
        padding-top: 2px;
      }
      .nav-links a {
        padding: 7px 12px;
        font-size: 0.81rem;
      }
      .member-body,
      .member-header {
        padding-left: 18px;
        padding-right: 18px;
      }
      .member-grid {
        grid-template-columns: 1fr;
      }
      .container { padding: 0 16px; }
    }
  </style>
</head>
<body>

<nav class="top-nav" aria-label="首页顶部导航">
  <div class="container">
    <a class="nav-brand" href="../index.html#hero-header">USTC-AGI <span>LLMs and Agentic AI</span></a>
    <div class="nav-links">
      <a href="../index.html#hero-header">首页</a>
      <a href="../index.html#research-tracks">研究方向</a>
      <a href="../papers/">论文发表</a>
      <a href="../index.html#application-systems">应用系统</a>
      <a href="../team/">团队成员</a>
      <a href="https://github.com/AgentR1" target="_blank" rel="noopener">GitHub</a>
    </div>
  </div>
</nav>

<header id="hero-header" role="button" tabindex="0" aria-label="点击刷新当前页面"
        onclick="location.reload()">
  <div class="container">
    <h1><span class="highlight">Team Members</span> 团队成员</h1>
    <p class="header-sub">
      中国科学技术大学 · 认知智能全国重点实验室 AGI 研究组<br>
      展示当前主页所列出的指导教师与核心成员
    </p>
  </div>
</header>

<main>
  <div class="container">
    <section class="member-shell" aria-labelledby="team-title">
      <div class="member-header">
        <h2 id="team-title">团队成员</h2>
        <p>指导教师与核心成员</p>
      </div>
      <div class="member-body">
        <div class="member-grid">
          <a class="member-card" href="http://staff.ustc.edu.cn/~qiliuql/" target="_blank" rel="noopener">
            <div class="member-avatar">刘</div>
            <div class="member-name">刘淇</div>
          </a>
          <a class="member-card" href="https://mingyue-cheng.github.io/" target="_blank" rel="noopener">
            <div class="member-avatar">程</div>
            <div class="member-name">程明月</div>
          </a>
          <div class="member-card-static">
            <div class="member-avatar">李</div>
            <div class="member-name">李鑫</div>
          </div>
          <div class="member-card-static">
            <div class="member-avatar">陈</div>
            <div class="member-name">陈恩红</div>
          </div>
        </div>
      </div>
    </section>
  </div>
</main>

<footer>
  <div class="container">
    <p>
      &copy; 2025–2026 Agentic AI Team &middot; <a href="https://ustcagi.github.io/" target="_blank" rel="noopener">USTC-AGI组</a> · State Key Laboratory of Cognitive Intelligence, USTC
    </p>
    <p class="footer-funding">
      本项目研究资助来源：国家自然科学基金委、国家科技重大攻关专项
    </p>
  </div>
</footer>

<script>
  const heroHeader = document.getElementById('hero-header');

  if (heroHeader) {
    const refreshPage = () => {
      window.location.reload();
    };

    heroHeader.addEventListener('click', refreshPage);
    heroHeader.addEventListener('keydown', (event) => {
      if (event.key === 'Enter' || event.key === ' ') {
        event.preventDefault();
        refreshPage();
      }
    });
  }
</script>

</body>
</html>
